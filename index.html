<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Map</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --color-text-primary: #111;
        --color-text-secondary: #555;
        --color-text-tertiary: #999;
        --color-text-danger: #cc3333;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f5;
        --color-border-secondary: #e0e0e0;
        --color-border-tertiary: #ddd;
      }
      body { background: #fff; color: #111; }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-text-primary: #f0f0f0;
        --color-text-secondary: #aaa;
        --color-text-tertiary: #777;
        --color-text-danger: #ff6666;
        --color-background-primary: #1e1e1e;
        --color-background-secondary: #2a2a2a;
        --color-border-secondary: #444;
        --color-border-tertiary: #555;
      }
      body { background: #1e1e1e; color: #f0f0f0; }
    }
    button { font-family: inherit; }
  </style>
  <script>
    // Polyfill window.storage (Claude artifact API) with localStorage
    window.storage = {
      get: function(key) {
        return new Promise(function(resolve) {
          var val = localStorage.getItem(key);
          resolve(val != null ? { value: val } : null);
        });
      },
      set: function(key, value) {
        localStorage.setItem(key, value);
      }
    };
  </script>
</head>
<body>
  <div id="root"></div>
  <script id="org-map-source" type="text/plain" src="placeholder"></script>
  <script>
    // Load org-map.jsx, transform import/export, and run via Babel
    fetch('org-map.jsx')
      .then(function(r) { return r.text(); })
      .then(function(code) {
        // Replace import with destructuring from React global
        code = code.replace(
          /import\s*\{[^}]+\}\s*from\s*["']react["'];?/,
          'const { useState, useEffect, useRef } = React;'
        );
        // Remove export default
        code = code.replace(/export\s+default\s+function\s+App/, 'function App');
        // Add render call
        code += '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));';
        // Transform JSX via Babel and execute
        var transformed = Babel.transform(code, { presets: ['react'] }).code;
        var script = document.createElement('script');
        script.textContent = transformed;
        document.body.appendChild(script);
      })
      .catch(function(err) {
        document.getElementById('root').innerHTML =
          '<p style="padding:2rem;color:red;">Failed to load org-map.jsx. Make sure you are serving this via an HTTP server (not file://). Error: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
